<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SmartCane — Camera</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c0c;
    --surface: #0f1a1a;
    --border: #1a2e2e;
    --teal: #00e5c8;
    --teal-dim: rgba(0,229,200,0.12);
    --teal-glow: rgba(0,229,200,0.4);
    --amber: #ffb020;
    --red: #ff4545;
    --text: #d0eded;
    --muted: #4a7070;
    --mono: 'Space Mono', monospace;
    --display: 'Syne', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--display);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  header {
    padding: 16px 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    z-index: 10;
    flex-shrink: 0;
  }
  .logo { font-size: 18px; font-weight: 800; letter-spacing: -.02em; color: var(--teal); }
  .logo span { color: var(--text); }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--muted); transition: all .3s;
    display: inline-block; margin-right: 6px;
  }
  .status-dot.active { background: var(--teal); box-shadow: 0 0 8px var(--teal-glow); animation: pulse-dot 2s infinite; }
  .status-dot.scanning { background: var(--amber); box-shadow: 0 0 8px rgba(255,176,32,.5); animation: pulse-dot 1s infinite; }
  @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }
  .status-text { font-family: var(--mono); font-size: 10px; letter-spacing: .08em; color: var(--muted); text-transform: uppercase; }
  .status-text.active { color: var(--teal); }
  .status-text.scanning { color: var(--amber); }

  .camera-wrap { position: relative; flex: 1; overflow: hidden; background: #000; min-height: 0; }
  video { width: 100%; height: 100%; object-fit: cover; display: block; }
  canvas { display: none; }

  .hud { position: absolute; inset: 0; pointer-events: none; }
  .corner { position: absolute; width: 28px; height: 28px; border-color: var(--teal); border-style: solid; opacity: .7; }
  .corner.tl { top: 16px; left: 16px; border-width: 2px 0 0 2px; }
  .corner.tr { top: 16px; right: 16px; border-width: 2px 2px 0 0; }
  .corner.bl { bottom: 80px; left: 16px; border-width: 0 0 2px 2px; }
  .corner.br { bottom: 80px; right: 16px; border-width: 0 2px 2px 0; }

  .scan-line { position: absolute; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--teal), transparent); opacity: 0; top: 20%; }
  .scan-line.running { opacity: .6; animation: scan 2s ease-in-out infinite; }
  @keyframes scan { 0% { top: 15%; opacity: 0; } 10% { opacity: .6; } 90% { opacity: .6; } 100% { top: 80%; opacity: 0; } }

  .alert-overlay {
    position: absolute; bottom: 80px; left: 12px; right: 12px;
    background: rgba(8,12,12,.88); border: 1px solid var(--border);
    border-left: 3px solid var(--teal); border-radius: 6px;
    padding: 12px 14px; backdrop-filter: blur(8px);
    display: none; animation: slide-up .25s ease;
  }
  .alert-overlay.visible { display: block; }
  .alert-overlay.urgent { border-left-color: var(--red); }
  .alert-overlay.warning { border-left-color: var(--amber); }
  @keyframes slide-up { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .alert-type { font-family: var(--mono); font-size: 9px; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .alert-overlay.urgent  .alert-type { color: var(--red); }
  .alert-overlay.warning .alert-type { color: var(--amber); }
  .alert-overlay.safe    .alert-type { color: var(--teal); }
  .alert-text { font-size: 14px; font-weight: 700; line-height: 1.4; color: var(--text); }
  .alert-time { font-family: var(--mono); font-size: 9px; color: var(--muted); margin-top: 4px; }

  .no-camera { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; background: var(--surface); }
  .no-camera .icon { font-size: 3rem; opacity: .4; }
  .no-camera p { font-family: var(--mono); font-size: 12px; color: var(--muted); text-align: center; max-width: 220px; line-height: 1.6; }

  .controls { padding: 14px 20px 24px; background: var(--surface); border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; flex-shrink: 0; z-index: 10; }
  .api-row { display: flex; gap: 8px; align-items: center; }
  .api-input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 9px 12px; font-family: var(--mono); font-size: 11px; color: var(--text); outline: none; transition: border-color .2s; }
  .api-input:focus { border-color: var(--teal); }
  .api-input::placeholder { color: var(--muted); }

  .btn-row { display: flex; gap: 8px; }
  .btn { flex: 1; padding: 13px; border: none; border-radius: 8px; font-family: var(--display); font-size: 13px; font-weight: 700; letter-spacing: .02em; cursor: pointer; transition: all .15s; display: flex; align-items: center; justify-content: center; gap: 7px; -webkit-user-select: none; }
  .btn:active { transform: scale(.96); }
  .btn-start { background: var(--teal); color: var(--bg); }
  .btn-start:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }
  .btn-stop { background: transparent; color: var(--red); border: 1.5px solid var(--red); }
  .btn-flip { flex: 0 0 52px; background: var(--teal-dim); color: var(--teal); border: 1px solid var(--border); font-size: 18px; }
  .btn-location { background: var(--teal-dim); color: var(--teal); border: 1px solid var(--border); }

  .interval-row { display: flex; align-items: center; justify-content: space-between; padding: 0 2px; }
  .interval-label { font-family: var(--mono); font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; }
  .interval-pills { display: flex; gap: 4px; }
  .ipill { padding: 4px 10px; border-radius: 99px; font-family: var(--mono); font-size: 10px; background: var(--bg); border: 1px solid var(--border); color: var(--muted); cursor: pointer; transition: all .15s; }
  .ipill.active { background: var(--teal-dim); border-color: var(--teal); color: var(--teal); }
  .frame-count { font-family: var(--mono); font-size: 9px; color: var(--muted); text-align: center; letter-spacing: .1em; }
</style>
</head>
<body>

<header>
  <div class="logo">Smart<span>Cane</span></div>
  <div style="display:flex;align-items:center">
    <span class="status-dot" id="statusDot"></span>
    <span class="status-text" id="statusText">OFFLINE</span>
  </div>
</header>

<div class="camera-wrap" id="cameraWrap">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>

  <div class="hud">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <div class="scan-line" id="scanLine"></div>
  </div>

  <div class="alert-overlay" id="alertOverlay">
    <div class="alert-type" id="alertType">DETECTING</div>
    <div class="alert-text" id="alertText">Initializing obstacle detection...</div>
    <div class="alert-time" id="alertTime"></div>
  </div>

  <div class="no-camera" id="noCam">
    <div class="icon">📷</div>
    <p>Camera access required.<br>Enter your OpenAI key and tap START.</p>
  </div>
</div>

<div class="controls">
  <div class="api-row">
    <input class="api-input" id="apiKey" type="password" placeholder="sk-... OpenAI API key">
  </div>

  <div class="interval-row">
    <span class="interval-label">Scan every</span>
    <div class="interval-pills">
      <div class="ipill" data-val="1500">1.5s</div>
      <div class="ipill active" data-val="2500">2.5s</div>
      <div class="ipill" data-val="4000">4s</div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn btn-flip" id="btnFlip" title="Flip camera">⟳</button>
    <button class="btn btn-start" id="btnStart">START SCANNING</button>
    <button class="btn btn-stop" id="btnStop" style="display:none">■ STOP</button>
  </div>
  
  <button class="btn btn-location" id="btnLocation">GET MY LOCATION</button>
  <div id="locationDisplay" style="font-family:var(--mono);font-size:10px;color:var(--muted);text-align:center;min-height:16px;"></div>

  <div class="frame-count" id="frameCount">FRAMES ANALYZED: 0</div>
</div>

<script>
  const video     = document.getElementById('video');
  const canvas    = document.getElementById('canvas');
  const ctx       = canvas.getContext('2d');
  const btnStart  = document.getElementById('btnStart');
  const btnStop   = document.getElementById('btnStop');
  const btnFlip   = document.getElementById('btnFlip');
  const apiKeyEl  = document.getElementById('apiKey');
  const alertBox  = document.getElementById('alertOverlay');
  const alertType = document.getElementById('alertType');
  const alertText = document.getElementById('alertText');
  const alertTime = document.getElementById('alertTime');
  const statusDot = document.getElementById('statusDot');
  const statusTxt = document.getElementById('statusText');
  const scanLine  = document.getElementById('scanLine');
  const noCam     = document.getElementById('noCam');
  const frameCountEl = document.getElementById('frameCount');

  let stream = null;
  let scanInterval = null;
  let facingMode = 'environment';
  let intervalMs = 2500;
  let frameCount = 0;

  document.querySelectorAll('.ipill').forEach(pill => {
    pill.addEventListener('click', () => {
      document.querySelectorAll('.ipill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      intervalMs = parseInt(pill.dataset.val);
    });
  });

  async function startCamera() {
    try {
      if (stream) stream.getTracks().forEach(t => t.stop());
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false
      });
      video.srcObject = stream;
      noCam.style.display = 'none';
      return true;
    } catch (e) {
      showAlert('ERROR', 'Camera access denied. Please allow camera permission.', 'urgent');
      return false;
    }
  }

  btnFlip.addEventListener('click', async () => {
    facingMode = facingMode === 'environment' ? 'user' : 'environment';
    await startCamera();
  });

  function captureFrame() {
    canvas.width  = video.videoWidth  || 640;
    canvas.height = video.videoHeight || 480;
    ctx.drawImage(video, 0, 0);
    const scale = Math.min(1, 512 / canvas.width);
    const w = Math.round(canvas.width  * scale);
    const h = Math.round(canvas.height * scale);
    const small = document.createElement('canvas');
    small.width = w; small.height = h;
    small.getContext('2d').drawImage(canvas, 0, 0, w, h);
    return small.toDataURL('image/jpeg', 0.7).split(',')[1];
  }

  const PROMPT = `You are the obstacle detection module for a smart cane used by a visually impaired person.
Analyze this camera frame.

Respond with ONLY a JSON object (no markdown):
{
  "level": "safe" | "warning" | "urgent",
  "message": "one short sentence for the user (max 12 words)"
}

Level rules:
- "urgent": stairs/step-down, vehicle, fast-moving person, glass door, low ceiling
- "warning": person nearby, door, narrow passage, bicycle, dog
- "safe": clear path ahead

Be concise. The message will be spoken aloud.`;

  async function analyzeFrame(b64, apiKey) {
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
      body: JSON.stringify({
        model: 'gpt-4o',
        max_tokens: 80,
        messages: [{ role: 'user', content: [
          { type: 'image_url', image_url: { url: `data:image/jpeg;base64,${b64}`, detail: 'low' } },
          { type: 'text', text: PROMPT }
        ]}]
      })
    });
    if (!res.ok) throw new Error(`API ${res.status}`);
    const data = await res.json();
    const raw = data.choices[0].message.content.trim();
    return JSON.parse(raw.replace(/```json|```/g, '').trim());
  }

  function showAlert(level, message, override) {
    const l = override || level;
    alertBox.className = `alert-overlay visible ${l}`;
    alertType.textContent = l.toUpperCase();
    alertText.textContent = message;
    alertTime.textContent = new Date().toLocaleTimeString();
  }

  function setStatus(state) {
    statusDot.className = 'status-dot ' + state;
    const labels = { '': 'OFFLINE', active: 'LIVE', scanning: 'SCANNING' };
    statusTxt.className = 'status-text ' + state;
    statusTxt.textContent = labels[state] || state.toUpperCase();
  }

  async function doScan() {
    const apiKey = apiKeyEl.value.trim();
    if (!apiKey) return;
    scanLine.classList.add('running');
    setStatus('scanning');
    try {
      const b64    = captureFrame();
      const result = await analyzeFrame(b64, apiKey);
      frameCount++;
      frameCountEl.textContent = `FRAMES ANALYZED: ${frameCount}`;
      showAlert(result.level, result.message);
      if ('speechSynthesis' in window && result.level !== 'safe') {
        window.speechSynthesis.cancel();
        const utt = new SpeechSynthesisUtterance(result.message);
        utt.rate = 1.1;
        window.speechSynthesis.speak(utt);
      }
    } catch (e) {
      showAlert('error', `Error: ${e.message}`, 'urgent');
    } finally {
      scanLine.classList.remove('running');
      setStatus('active');
    }
  }

  btnStart.addEventListener('click', async () => {
    const apiKey = apiKeyEl.value.trim();
    if (!apiKey) { showAlert('error', 'Please enter your OpenAI API key first.', 'urgent'); return; }
    const ok = await startCamera();
    if (!ok) return;
    btnStart.style.display = 'none';
    btnStop.style.display  = 'flex';
    setStatus('active');
    showAlert('safe', 'Camera active. Scanning for obstacles...', 'safe');
    await doScan();
    scanInterval = setInterval(doScan, intervalMs);
  });

  btnStop.addEventListener('click', () => {
    clearInterval(scanInterval);
    if (stream) stream.getTracks().forEach(t => t.stop());
    stream = null;
    video.srcObject = null;
    noCam.style.display = 'flex';
    btnStop.style.display  = 'none';
    btnStart.style.display = 'flex';
    setStatus('');
    alertBox.classList.remove('visible');
    scanLine.classList.remove('running');
    window.speechSynthesis?.cancel();
  });
  const BACKEND = 'http://localhost:8000';
let userLocation = null;

async function getLocation() {
  const display = document.getElementById('locationDisplay');
  display.textContent = 'Getting location...';
  
  navigator.geolocation.getCurrentPosition(async (pos) => {
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;
    userLocation = { lat, lng };
    
    // 🔥 SEND TO DASHBOARD IMMEDIATELY
    try {
      const res = await fetch(`${BACKEND}/location/update`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          lat, lng, 
          level: 'safe',
          message: 'Location acquired'
        })
      });
      if (res.ok) {
        display.textContent = `📍 SENT ${lat.toFixed(5)}, ${lng.toFixed(5)}`;
      }
    } catch (e) {
      display.textContent = `📍 ${lat.toFixed(5)}, ${lng.toFixed(5)}`;
    }
    
    // Also get address for display
    try {
      const addrRes = await fetch(`${BACKEND}/location/address?lat=${lat}&lng=${lng}`);
      const addrData = await addrRes.json();
      display.textContent += ` | ${addrData.address}`;
    } catch {}
    
  }, (err) => {
    display.textContent = `Location error: ${err.message}`;
  }, { enableHighAccuracy: true, timeout: 10000 });
}

async function searchNearby(query) {
  if (!userLocation) { alert('Get location first'); return; }
  const { lat, lng } = userLocation;
  const res = await fetch(`${BACKEND}/places/nearby?lat=${lat}&lng=${lng}&query=${encodeURIComponent(query)}`);
  return await res.json();
}

async function getDirections(destLat, destLng) {
  if (!userLocation) return;
  const { lat, lng } = userLocation;
  const res = await fetch(`${BACKEND}/directions?origin_lat=${lat}&origin_lng=${lng}&dest_lat=${destLat}&dest_lng=${destLng}`);
  return await res.json();
}

document.getElementById('btnLocation').addEventListener('click', getLocation);
</script>
</body>
</html>
